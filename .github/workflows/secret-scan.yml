name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan committed files for credentials
        run: npm run scan-secrets
